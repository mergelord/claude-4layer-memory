name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Pylint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint

    - name: Lint with pylint
      run: |
        python -m pylint scripts/*.py audit.py \
          --disable=C0114,C0115,C0116,R0913,R0914,R0915,R0903,R0904,W0718,R1702,C0415,R0902,R0912 \
          --max-line-length=110 \
          --good-names=i,j,k,e,f,_,rc

  typecheck:
    name: MyPy Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mypy

    - name: Type check with mypy
      run: |
        mypy scripts/*.py audit.py \
          --ignore-missing-imports \
          --no-strict-optional \
          --allow-untyped-defs \
          --allow-incomplete-defs

  ruff:
    name: Ruff Linter
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Ruff
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Lint with Ruff
      run: |
        ruff check scripts/*.py audit.py

  bandit:
    name: Bandit Security Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Security check with Bandit
      run: |
        bandit -r scripts/ audit.py -ll

  radon:
    name: Radon Complexity Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Radon
      run: |
        python -m pip install --upgrade pip
        pip install radon

    - name: Complexity check with Radon
      run: |
        radon cc scripts/*.py audit.py -a -nb
        radon mi scripts/*.py audit.py -nb
