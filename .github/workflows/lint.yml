name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Pylint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint

    - name: Lint with pylint
      run: |
        python -m pylint scripts/*.py audit.py \
          --disable=C0114,C0115,C0116,R0913,R0914,R0915,R0903,R0904,W0718,R1702,C0415,R0902,R0912,R0801 \
          --max-line-length=110 \
          --good-names=i,j,k,e,f,_,rc

  typecheck:
    name: MyPy Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mypy

    - name: Type check with mypy
      run: |
        mypy scripts/*.py audit.py \
          --ignore-missing-imports \
          --no-strict-optional \
          --allow-untyped-defs \
          --allow-incomplete-defs

  ruff:
    name: Ruff Linter
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Ruff
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Lint with Ruff
      run: |
        ruff check scripts/*.py audit.py

  encoding:
    name: EncodingGate (mojibake detector)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # The scanner only depends on stdlib + ``memory_lint_helpers`` from
    # the repo itself, so we deliberately skip pip install to keep the
    # job cheap and fast (target: <30s wall clock).
    - name: Scan repository for cp1251-as-utf8 mojibake / U+FFFD
      run: |
        python scripts/scan_repo_encoding.py

  security-and-complexity:
    name: ${{ matrix.tool.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool:
          - name: Bandit Security Check
            package: bandit
            command: bandit -r scripts/ audit.py -l --skip B404,B603
          - name: Radon Complexity Check
            package: radon
            command: |
              radon cc scripts/*.py audit.py -a -nb
              radon mi scripts/*.py audit.py -nb

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install ${{ matrix.tool.package }}
      run: |
        python -m pip install --upgrade pip
        pip install ${{ matrix.tool.package }}

    - name: Run ${{ matrix.tool.name }}
      run: ${{ matrix.tool.command }}
