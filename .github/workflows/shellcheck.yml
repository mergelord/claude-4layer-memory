name: Shellcheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: './scripts/linux'
        severity: warning

    - name: Check install script
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: '.'
        check_together: 'yes'
        ignore_paths: '.git .github node_modules'
